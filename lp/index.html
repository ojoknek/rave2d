<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAVE 2D</title>
    <meta name="description" content="Tokyo-based DJ mix brand.">
    <link rel="icon" href="/image/RAVE2D-fabicon.svg" type="image/svg+xml">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://rave2d.com/lp">
    <meta property="og:title" content="RAVE 2D">
    <meta property="og:description" content="Intersection of internet and club. Tokyo-based DJ mix brand.">
    <meta property="og:image" content="https://rave2d.com/image/RAVE2D-ICON.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RAVE 2D">
    <meta name="twitter:description" content="Intersection of internet and club. Tokyo-based DJ mix brand.">
    <meta name="twitter:image" content="https://rave2d.com/image/RAVE2D-ICON.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --blue: #0022FF;
            --blue-glow: rgba(0, 34, 255, 0.35);
            --line: #222222;
            --card-bg: #0d0d0d;
            --font: 'Unbounded', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px 64px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* HEADER */
        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-bottom: 40px;
        }

        .logo-img {
            width: 240px;
            height: auto;
        }

        .tagline {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #888;
            text-align: center;
        }

        /* SNS LINKS */
        .sns-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-bottom: 16px;
        }

        .sns-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            height: 48px;
            border: 1px solid var(--line);
            border-radius: 4px;
            font-family: var(--font);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--text);
            text-decoration: none;
            background: var(--card-bg);
            transition: border-color 0.2s, background 0.2s;
        }

        .sns-btn:hover {
            border-color: #444;
            background: #141414;
        }

        .sns-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            fill: currentColor;
        }

        /* YOUTUBE SUBSCRIBE */
        .yt-subscribe {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            height: 56px;
            background: var(--blue);
            border-radius: 4px;
            font-family: var(--font);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.18em;
            color: var(--text);
            text-decoration: none;
            margin-bottom: 48px;
            box-shadow: 0 0 24px var(--blue-glow);
            transition: box-shadow 0.2s, opacity 0.2s;
        }

        .yt-subscribe:hover {
            opacity: 0.88;
            box-shadow: 0 0 40px var(--blue-glow);
        }

        .yt-subscribe svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* SECTION LABEL */
        .section-label {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .section-label span {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.25em;
            color: #555;
            white-space: nowrap;
        }

        .section-label::before,
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        /* VIDEO CARDS */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .video-card {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 4px;
            overflow: hidden;
            background: var(--card-bg);
        }

        .video-thumb-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            overflow: hidden;
            background: #111;
        }

        .video-thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .video-thumb-wrap:hover img {
            transform: scale(1.03);
        }

        .play-btn {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        .video-thumb-wrap:hover .play-btn {
            background: rgba(0,0,0,0.15);
        }

        .play-btn::after {
            content: '';
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-icon {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 9px 0 9px 18px;
            border-color: transparent transparent transparent #ffffff;
            margin-left: 4px;
        }

        .video-embed {
            display: none;
            width: 100%;
            aspect-ratio: 16 / 9;
        }

        .video-embed iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .video-embed.is-active {
            display: block;
        }

        .video-thumb-wrap.is-hidden {
            display: none;
        }

        .video-info {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .video-title {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--text);
        }

        .video-watch {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #888;
            text-decoration: none;
            border: 1px solid var(--line);
            border-radius: 3px;
            padding: 6px 10px;
            white-space: nowrap;
            transition: color 0.2s, border-color 0.2s;
        }

        .video-watch:hover {
            color: var(--text);
            border-color: #444;
        }

        /* FOOTER */
        .footer-link {
            margin-top: 52px;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: #444;
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #888;
        }

        .footer-link span {
            margin-right: 4px;
        }
    </style>
</head>
<body>

<script>
    document.querySelectorAll('.video-thumb-wrap').forEach(function(thumb) {
        function activate() {
            var videoId = thumb.getAttribute('data-video-id');
            var embedWrap = thumb.parentElement.querySelector('.video-embed');
            var iframe = document.createElement('iframe');
            iframe.src = 'https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1&rel=0';
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            iframe.title = videoId;
            embedWrap.appendChild(iframe);
            embedWrap.classList.add('is-active');
            thumb.classList.add('is-hidden');
        }

        thumb.addEventListener('click', activate);
        thumb.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                activate();
            }
        });
    });
</script>
